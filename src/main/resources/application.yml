server:
  port: 8080

spring:
  datasource:
    url: ${weeklyreport.db-path:jdbc:sqlite:weekly_report.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

deepseek:
  api-key: ${weeklyreport.api-key:${DEEPSEEK_API_KEY:your-api-key-here}}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat

reminder:
  cron: 0 0 17 * * 1-5
